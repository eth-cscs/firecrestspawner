{% extends "page.html" %}

{% block main %}
  <div class="container">
  <div class="min-h-screen flex flex-col items-center justify-center px-4 py-10 bg-gray-50">
    <div class="text-center space-y-4 w-full max-w-2xl">
        {% block message %}
          <p class="text-lg text-gray-700">Your server is starting up.</p>
          <p class="text-gray-600">You will be redirected automatically when it's ready for you.</p>
        {% endblock message %}
        <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
          <div id="progress-bar"
	       class="progress-bar h-4 bg-blue-600 transition-all duration-300"
               role="progressbar"
               aria-valuenow="0"
               aria-valuemin="0"
               aria-valuemax="100" style="width: 0%;">
            <span class="sr-only"><span id="sr-progress">0%</span> Complete</span>
          </div>
        </div>
        <p id="progress-message" class="text-sm text-gray-700"></p>
      </div>
    </div>
    <div class="w-full max-w-3xl mt-8">
   
        <details id="progress-details" class="bg-white border border-gray-300 rounded p-4">
          <summary class="cursor-pointer font-medium text-gray-800">Event log</summary>
          <div id="progress-log" class="mt-3 space-y-1 text-sm text-gray-700 font-mono"></div>
        </details>
      </div>
    </div>

  <!-- Style hook for failure state expected by JS -->
  <style>
    .progress-bar-danger {
      background-color: #dc2626; /* Tailwind red-600 */
    }
  </style>
{% endblock main %}
{% block script %}
  {{ super() }}
  <script type="text/javascript">
    require(["jquery"], function($) {
      $("#refresh").click(function() {
        window.location.reload();
      });

      // hook up event-stream for progress
      var evtSource = new EventSource("{{ progress_url }}");
      var progressMessage = $("#progress-message");
      var progressBar = $("#progress-bar");
      var srProgress = $("#sr-progress");
      var progressLog = $("#progress-log");

      evtSource.onmessage = function(e) {
        var evt = JSON.parse(e.data);
        console.log(evt);
        if (evt.progress !== undefined) {
          // update progress
          var progText = evt.progress.toString();
          progressBar.attr('aria-valuenow', progText);
          srProgress.text(progText + '%');
          progressBar.css('width', progText + '%');
        }
        // update message
        var html_message;
        if (evt.html_message !== undefined) {
          progressMessage.html(evt.html_message);
          html_message = evt.html_message;
        } else if (evt.message !== undefined) {
          progressMessage.text(evt.message);
          html_message = progressMessage.html();
        }
        if (html_message) {
          progressLog.append(
            $("<div>")
            .addClass('progress-log-event')
            .html(html_message)
          );
        }

        if (evt.ready) {
          evtSource.close();
          // reload the current page
          // which should result in a redirect to the running server
          window.location.reload();
        }

        if (evt.failed) {
          evtSource.close();
          // turn progress bar red
          progressBar.addClass('progress-bar-danger');
          // open event log for debugging
          $('#progress-details').prop('open', true);
        }
      };

      // signal that page has finished loading (mostly for tests)
      window._jupyterhub_page_loaded = true;
    });
  </script>
{% endblock script %}
